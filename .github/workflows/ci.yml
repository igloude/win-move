name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build Tactadile.Tests/Tactadile.Tests.csproj -p:Platform=x64

      - name: Test
        run: dotnet test Tactadile.Tests/Tactadile.Tests.csproj -p:Platform=x64 --no-build --verbosity normal
